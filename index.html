<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh;background:#F5F0E8}
:root{
  --teal:#00B5A3;--teal-light:#E6FAF8;--teal-mid:#00C9B5;--teal-dark:#008F80;
  --orange:#FF6B2B;--orange-light:#FFF0E8;--orange-dark:#D94F15;
  --cream:#F5F0E8;--border:#E0DAD4;
  --text:#2C2A27;--muted:#8A847D
}
#app{width:100%;margin:0 auto;padding:10px;font-family:'Noto Sans JP',sans-serif;background:#F5F0E8;min-height:100vh}
.screen{display:none}.screen.active{display:block}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 10px;border-bottom:2px solid var(--teal);margin-bottom:12px}
.logo{font-size:15px;letter-spacing:.12em;color:var(--teal);font-weight:500}
.btn-sm{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--muted);cursor:pointer}
.btn-sm:hover{border-color:var(--teal);color:var(--teal)}
.section{margin-bottom:10px}
.section-label{font-size:13px;letter-spacing:.04em;color:var(--muted);margin-bottom:4px;font-weight:500}
.field{width:100%;border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:15px;color:var(--text);background:#fff;outline:none}
.field:focus{border-color:var(--teal)}
.name-wrap{position:relative}
.autocomplete{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--teal);border-radius:8px;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.autocomplete-item{padding:9px 12px;font-size:14px;cursor:pointer;color:var(--text)}
.autocomplete-item:hover{background:var(--teal-light)}
.date-display{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:9px 12px;cursor:pointer}
.date-display:hover{border-color:var(--teal)}
.date-display span{font-size:14px;color:var(--text);flex:1}
.date-display i{color:var(--teal);font-size:16px}
.parts-grid{display:flex;flex-wrap:wrap;gap:5px}
.part-tag{padding:5px 11px;border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--muted);cursor:pointer;background:#fff;transition:.15s}
.part-tag.selected{background:var(--teal);border-color:var(--teal);color:#fff}
.part-tag.new-tag{border-color:var(--orange);color:var(--orange);background:var(--orange-light)}
.part-tag.new-tag.selected{background:var(--orange);border-color:var(--orange);color:#fff}
.goal-row{display:flex;gap:8px}
.goal-btn{flex:1;padding:7px 4px;border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--muted);cursor:pointer;background:#fff;text-align:center}
.goal-btn.selected{background:var(--orange-light);border-color:var(--orange);color:var(--orange);font-weight:500}
.check-row{display:flex;gap:10px}
.check-opt{padding:6px 20px;border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--muted);cursor:pointer;background:#fff}
.check-opt.selected{border-color:var(--teal);color:var(--teal);background:var(--teal-light)}
.check-opt.bad.selected{border-color:#C0392B;color:#C0392B;background:#FDF0EF}

/* カルテ詳細・編集 */
.karte-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.karte-nav-btn{background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;color:var(--muted);cursor:pointer}
.karte-nav-btn:disabled{opacity:.3;cursor:default}
.karte-nav-counter{font-size:12px;color:var(--muted)}
.karte-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px}
.karte-card-label{font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:4px}
.karte-card-value{font-size:16px;color:var(--text);font-weight:500}
.karte-parts-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.karte-part-chip{padding:4px 10px;background:var(--teal-light);border:1px solid var(--teal);border-radius:16px;font-size:12px;color:var(--teal)}
.btn-edit{width:100%;background:#fff;border:2px solid var(--teal);color:var(--teal);border-radius:10px;padding:12px;font-size:14px;cursor:pointer;margin-bottom:8px}
.btn-delete{width:100%;background:#fff;border:1px solid #ddd;color:var(--muted);border-radius:10px;padding:10px;font-size:13px;cursor:pointer}
/* 編集フォーム内パーツ */
.edit-parts-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}

.btn-submit{width:100%;background:var(--teal);color:#fff;border:none;border-radius:10px;padding:13px;font-size:16px;font-weight:500;letter-spacing:.06em;cursor:pointer;margin-top:8px}
.btn-submit:active{opacity:.85}
.history-search{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;margin-bottom:12px;outline:none}
.history-search:focus{border-color:var(--teal)}
.customer-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border-left:3px solid var(--teal)}
.customer-card:hover{background:var(--teal-light)}
.customer-name{font-size:17px;font-weight:500;color:var(--text)}
.customer-meta{font-size:14px;color:var(--muted);margin-top:4px}
.record-item{border-left:3px solid var(--orange);padding:8px 12px;margin-bottom:8px;background:var(--orange-light);border-radius:0 8px 8px 0}
.record-date{font-size:11px;color:var(--orange-dark);font-weight:500}
.record-parts{font-size:13px;color:var(--text);margin-top:3px}
.record-detail{font-size:12px;color:var(--muted);margin-top:2px}
.back-btn{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0 0 12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--orange);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;display:none}
.empty-state{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center}
.confirm-box{background:#fff;border-radius:14px;padding:24px 20px;width:280px;text-align:center}
.confirm-msg{font-size:15px;color:var(--text);margin-bottom:20px;line-height:1.6}
.confirm-btns{display:flex;gap:10px}
.confirm-btn-cancel{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--muted);font-size:14px;cursor:pointer}
.confirm-btn-ok{flex:1;padding:10px;border:none;border-radius:8px;background:#C0392B;color:#fff;font-size:14px;cursor:pointer}
.karte-list-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border-left:3px solid var(--teal);display:flex;justify-content:space-between;align-items:center}
.karte-list-item:hover{background:var(--teal-light)}
.karte-list-left{flex:1}
.karte-list-date{font-size:15px;font-weight:500;color:var(--teal)}
.karte-list-parts{font-size:13px;color:var(--muted);margin-top:3px}
.karte-list-num{font-size:12px;color:var(--muted);margin-right:8px}
.btn-delete-small{background:none;border:1px solid #ddd;color:var(--muted);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
.btn-delete-small:hover{border-color:#C0392B;color:#C0392B}

/* レスポンシブ：縦長・幅制限 */
.form-body{display:block}
.narrow{max-width:50%}
@media(min-width:600px){
  #app{padding:20px 32px}
}
</style>

    <div class="form-body">

    <div class="section">
      <div class="section-label">来店日</div>
      <div class="narrow" style="display:flex;align-items:center;background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 12px;gap:8px">
        📅
        <input type="date" id="dateInput" onchange="setDate(this.value)"
          style="border:none;outline:none;font-size:15px;color:var(--text);background:transparent;font-family:'Noto Sans JP',sans-serif">
      </div>
    </div>

    <div class="section">
      <div class="section-label">お客様氏名</div>
      <div class="name-wrap narrow">
        <input class="field" id="nameInput" type="text" placeholder="氏名を入力" oninput="onNameInput(this.value)" autocomplete="off">
        <div class="autocomplete" id="autocomplete" style="display:none"></div>
      </div>
    </div>

    <div class="section" style="grid-column:1/-1">
      <div class="section-label">希望部位（複数選択可）</div>
      <div class="parts-grid" id="partsGrid"></div>
    </div>

    <div class="section">
      <div class="section-label">ゴール</div>
      <div class="goal-row">
        <button class="goal-btn" onclick="selectGoal(this)">ツルツル</button>
        <button class="goal-btn" onclick="selectGoal(this)">減毛</button>
        <button class="goal-btn" onclick="selectGoal(this)">今回のみ</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">赤み</div>
      <div class="check-row">
        <div class="check-opt" onclick="selectCheck('redness','有',this)">有</div>
        <div class="check-opt" onclick="selectCheck('redness','無',this)">無</div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">抜け</div>
      <div class="check-row">
        <div class="check-opt" onclick="selectCheck('removal','良',this)">良</div>
        <div class="check-opt bad" onclick="selectCheck('removal','不良',this)">不良</div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">コメント</div>
      <textarea class="field narrow" id="commentInput" rows="2" placeholder="気になる点・備考など" style="resize:vertical"></textarea>
    </div>
    </div><!-- /form-body -->
    <button class="btn-submit" onclick="saveRecord()">カルテを保存する</button>
  </div>

  <div class="screen" id="screen-history">
    <div class="header">
      <span class="logo">施術履歴</span>
      <button class="btn-sm" style="background:var(--teal);color:#fff;border-color:var(--teal)" onclick="showForm()">+ カルテ入力</button>
    </div>
    <input class="history-search" id="histSearch" type="text" placeholder="お名前で検索..." oninput="renderHistory(this.value)">
    <div id="historyList"></div>
  </div>

  <!-- 顧客別カルテ一覧 -->
  <div class="screen" id="screen-detail">
    <div class="header">
      <span class="logo" id="detailName"></span>
      <button class="btn-sm" style="background:var(--teal);color:#fff;border-color:var(--teal)" onclick="showForm()">+ カルテ入力</button>
    </div>
    <button class="back-btn" onclick="showHistory()">← 履歴一覧へ</button>
    <div id="karteList"></div>
  </div>

  <!-- カルテ詳細 -->
  <div class="screen" id="screen-karte">
    <div class="header">
      <span class="logo" id="karteDetailName"></span>
      <button class="btn-sm" style="background:var(--teal);color:#fff;border-color:var(--teal)" onclick="showForm()">+ カルテ入力</button>
    </div>
    <button class="back-btn" onclick="showDetail(currentName)">← 一覧へ</button>
    <div id="karteView"></div>
  </div>

  <!-- カルテ編集 -->
  <div class="screen" id="screen-edit">
    <div class="header"><span class="logo">カルテ編集</span></div>
    <div class="section">
      <div class="section-label">来店日</div>
      <div class="narrow" style="display:flex;align-items:center;background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 12px;gap:8px">
        📅
        <input type="date" id="editDate" style="border:none;outline:none;font-size:15px;color:var(--text);background:transparent;font-family:'Noto Sans JP',sans-serif">
      </div>
    </div>
    <div class="section">
      <div class="section-label">希望部位</div>
      <div class="edit-parts-grid" id="editPartsGrid"></div>
    </div>
    <div class="section">
      <div class="section-label">ゴール</div>
      <div class="goal-row">
        <button class="goal-btn" onclick="selectEditGoal(this)">ツルツル</button>
        <button class="goal-btn" onclick="selectEditGoal(this)">減毛</button>
        <button class="goal-btn" onclick="selectEditGoal(this)">今回のみ</button>
      </div>
    </div>
    <div class="section">
      <div class="section-label">赤み</div>
      <div class="check-row">
        <div class="check-opt" onclick="selectEditCheck('redness','有',this)">有</div>
        <div class="check-opt" onclick="selectEditCheck('redness','無',this)">無</div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">抜け</div>
      <div class="check-row">
        <div class="check-opt" onclick="selectEditCheck('removal','良',this)">良</div>
        <div class="check-opt bad" onclick="selectEditCheck('removal','不良',this)">不良</div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">コメント</div>
      <textarea class="field" id="editComment" rows="3"></textarea>
    </div>
    <button class="btn-submit" onclick="saveEdit()">変更を保存する</button>
    <button class="back-btn" style="margin-top:12px;width:100%;justify-content:center" onclick="openKarte(currentIdx)">＜＜ 戻る</button>
  </div>
</div>

<script>


const PARTS=[
  {label:'新規VIO',cat:'new',br:false},{label:'再来VIO',cat:'vio',br:false},{label:'期間外VIO',cat:'vio',br:false},{label:'デザイン',cat:'vio',br:true},
  {label:'足ALL',cat:'legs',br:false},{label:'ひざ上',cat:'legs',br:false},{label:'ひざ下',cat:'legs',br:true},
  {label:'腕ALL',cat:'arms',br:false},{label:'ひじ上',cat:'arms',br:false},{label:'ひじ下',cat:'arms',br:true},
  {label:'背中（全体）',cat:'back',br:false},{label:'背中（ハーフ）',cat:'back',br:false},{label:'腰',cat:'back',br:false},{label:'胸',cat:'body',br:false},{label:'お尻',cat:'back',br:true},
  {label:'お腹（へそ下）',cat:'body',br:false},{label:'お腹（全体）',cat:'body',br:false},{label:'脇',cat:'body',br:false},{label:'うなじ',cat:'body',br:false},{label:'手の甲・指',cat:'arms',br:false},{label:'足の甲・指',cat:'legs',br:false},
];

let state={date:'',name:'',parts:new Set(),goal:'',redness:'',removal:'',comment:''};
let records=JSON.parse(localStorage.getItem('pv_rec')||'[]');
let customers=JSON.parse(localStorage.getItem('pv_cust')||'[]');

(function(){
  const t=new Date(),y=t.getFullYear(),m=String(t.getMonth()+1).padStart(2,'0'),d=String(t.getDate()).padStart(2,'0');
  const v=`${y}-${m}-${d}`;
  document.getElementById('dateInput').value=v;
  state.date=v;
  renderParts();
})();

function setDate(v){state.date=v;}

function renderParts(){
  const g=document.getElementById('partsGrid');g.innerHTML='';
  PARTS.forEach(p=>{
    const el=document.createElement('button');
    el.className='part-tag';
    el.textContent=p.label;el.onclick=()=>togglePart(p.label,el);g.appendChild(el);
    if(p.br){const sep=document.createElement('div');sep.style.cssText='width:100%;height:0';g.appendChild(sep);}
  });
}
function togglePart(l,el){state.parts.has(l)?(state.parts.delete(l),el.classList.remove('selected')):(state.parts.add(l),el.classList.add('selected'));}
function selectGoal(el){document.querySelectorAll('.goal-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');state.goal=el.textContent;}
function selectCheck(f,v,el){el.parentElement.querySelectorAll('.check-opt').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');state[f]=v;}

function onNameInput(v){
  state.name=v;const ac=document.getElementById('autocomplete');
  if(!v){ac.style.display='none';return;}
  const m=customers.filter(c=>c.startsWith(v)&&c!==v);
  if(!m.length){ac.style.display='none';return;}
  ac.innerHTML=m.map(c=>`<div class="autocomplete-item" onclick="pickName('${c}')">${c}</div>`).join('');
  ac.style.display='block';
}
function pickName(n){state.name=n;document.getElementById('nameInput').value=n;document.getElementById('autocomplete').style.display='none';}
document.addEventListener('click',e=>{if(!e.target.closest('.name-wrap'))document.getElementById('autocomplete').style.display='none';});


function saveRecord(){
  if(!state.name.trim()){showToast('お名前を入力してください');return;}
  if(!state.date){showToast('来店日を選択してください');return;}
  const name=state.name.trim();
  const rec={id:Date.now(),date:state.date,name:name,parts:[...state.parts],goal:state.goal,redness:state.redness,removal:state.removal,comment:document.getElementById('commentInput').value};
  records.push(rec);
  saveRecords();
  if(!customers.includes(name)){customers.push(name);localStorage.setItem('pv_cust',JSON.stringify(customers));}
  showToast('カルテを保存しました ✓');
  resetForm();
}

function saveRecords(){
  localStorage.setItem('pv_rec',JSON.stringify(records));
}
function resetForm(){
  state.parts=new Set();state.goal='';state.redness='';state.removal='';
  document.getElementById('commentInput').value='';document.getElementById('nameInput').value='';state.name='';
  renderParts();document.querySelectorAll('.goal-btn,.check-opt').forEach(b=>b.classList.remove('selected'));
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2200);}

function showHistory(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-history').classList.add('active');
  renderHistory('');
}
function showForm(){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-form').classList.add('active');}
function renderHistory(q){
  const list=document.getElementById('historyList');
  const names=[...new Set(records.map(r=>r.name))].filter(n=>n.includes(q));
  if(!names.length){list.innerHTML='<div class="empty-state">記録がありません</div>';return;}
  list.innerHTML=names.map(name=>{
    const rs=records.filter(r=>r.name===name),last=rs[rs.length-1];
    return `<div class="customer-card" onclick="showDetail('${name}')"><div class="customer-name">${name}</div><div class="customer-meta">来店 ${rs.length}回 ／ 最終: ${fmtDate(last.date)}</div></div>`;
  }).join('');
}
// 日付をYYYY-MM-DDに正規化
function fmtDate(d){
  if(!d) return '';
  if(d instanceof Date) d = d.toISOString();
  // ISO形式 2026-06-11T15:00:00.000Z
  if(d.includes('T')) d = d.split('T')[0];
  // スラッシュ区切り
  if(d.includes('/')) d = d.replace(/\//g,'-');
  return d;
}
// ---- 詳細・一覧 ----
let currentName = '';
let currentKartes = [];
let currentIdx = 0;
let editState = {redness:'', removal:''};

function showDetail(name){
  currentName = name;
  const all = records.filter(r=>r.name===name).sort((a,b)=>b.date.localeCompare(a.date)); // 新しい順
  currentKartes = all;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-detail').classList.add('active');
  document.getElementById('detailName').textContent = name + ' 様';
  // カルテ一覧を表示
  const list = document.getElementById('karteList');
  list.innerHTML = all.map((r,i) => {
    const num = all.length - i; // 新しい順なので番号を逆に
    const parts = (r.parts||[]).slice(0,3).join('・') + ((r.parts||[]).length > 3 ? '…' : '');
    return `<div class="karte-list-item">
      <div class="karte-list-left" onclick="openKarte(${i})">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="karte-list-num">${num}回目</span>
          <span class="karte-list-date">${fmtDate(r.date)}</span>
        </div>
        <div class="karte-list-parts">${parts||'部位未選択'}</div>
      </div>
      <button class="btn-delete-small" onclick="deleteKarteAt(${i})">🗑️</button>
    </div>`;
  }).join('');
}

function openKarte(idx){
  currentIdx = idx;
  const r = currentKartes[idx];
  const total = currentKartes.length;
  const num = total - idx;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-karte').classList.add('active');
  document.getElementById('karteDetailName').textContent = currentName + ' 様　' + num + '回目';
  const parts = (r.parts||[]);
  document.getElementById('karteView').innerHTML = `
    <div class="karte-card" onclick="showEdit()" style="cursor:pointer;position:relative">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div style="font-size:16px;font-weight:500;color:var(--teal)">${fmtDate(r.date)}</div>
        <button onclick="event.stopPropagation();deleteKarte()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 0 0 8px;line-height:1">🗑️</button>
      </div>
      <div style="margin-bottom:12px">
        <div class="karte-card-label">施術部位</div>
        <div class="karte-parts-wrap">${parts.length ? parts.map(p=>`<span class="karte-part-chip">${p}</span>`).join('') : '<span style="color:var(--muted);font-size:13px">—</span>'}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
        <div><div class="karte-card-label">ゴール</div><div class="karte-card-value">${r.goal||'—'}</div></div>
        <div><div class="karte-card-label">赤み</div><div class="karte-card-value">${r.redness||'—'}</div></div>
        <div><div class="karte-card-label">抜け</div><div class="karte-card-value">${r.removal||'—'}</div></div>
      </div>
      ${r.comment ? `<div><div class="karte-card-label">コメント</div><div style="font-size:13px;color:var(--text);margin-top:4px;line-height:1.6">${r.comment}</div></div>` : ''}
      <div style="margin-top:10px;font-size:12px;color:var(--muted);text-align:right">✏️ タップして編集</div>
    </div>`;
}

function showConfirm(onOk){
  const ov=document.createElement('div');
  ov.className='confirm-overlay';
  ov.innerHTML=`<div class="confirm-box"><div class="confirm-msg">このカルテを削除しますか？</div><div class="confirm-btns"><button class="confirm-btn-cancel">キャンセル</button><button class="confirm-btn-ok">削除する</button></div></div>`;
  ov.querySelector('.confirm-btn-cancel').onclick=()=>document.body.removeChild(ov);
  ov.querySelector('.confirm-btn-ok').onclick=()=>{document.body.removeChild(ov);onOk();};
  document.body.appendChild(ov);
}

function deleteKarteAt(idx){
  showConfirm(()=>{
    const r=currentKartes[idx];
    records=records.filter(rec=>!(fmtDate(rec.date)===fmtDate(r.date)&&rec.name===r.name));
    currentKartes.splice(idx,1);
    if(currentKartes.length===0){showHistory();return;}
    showDetail(currentName);
    showToast('削除しました');
  });
}

function deleteKarte(){
  showConfirm(()=>{
    const r=currentKartes[currentIdx];
    records=records.filter(rec=>!(fmtDate(rec.date)===fmtDate(r.date)&&rec.name===r.name));
    currentKartes.splice(currentIdx,1);
    if(currentKartes.length===0){showHistory();return;}
    showDetail(currentName);
    showToast('削除しました');
  });
}
function showEdit(){
  const r = currentKartes[currentIdx];
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-edit').classList.add('active');
  document.getElementById('editDate').value = fmtDate(r.date);
  document.getElementById('editComment').value = r.comment||'';
  editState.redness = r.redness||'';
  editState.removal = r.removal||'';

  // 部位グリッド
  const g = document.getElementById('editPartsGrid');
  g.innerHTML='';
  PARTS.forEach(p=>{
    const el=document.createElement('button');
    const sel = (r.parts||[]).includes(p.label);
    el.className='part-tag'+(sel?' selected':'');
    el.textContent=p.label;
    el.onclick=()=>el.classList.toggle('selected');
    g.appendChild(el);
    if(p.br){const sep=document.createElement('div');sep.style.cssText='width:100%;height:0';g.appendChild(sep);}
  });

  // ゴール
  document.querySelectorAll('#screen-edit .goal-btn').forEach(b=>{
    b.classList.toggle('selected', b.textContent===r.goal);
  });
  // 赤み・抜け
  document.querySelectorAll('#screen-edit .check-opt').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('#screen-edit .check-row').forEach(row=>{
    row.querySelectorAll('.check-opt').forEach(b=>{
      if(b.textContent===editState.redness||b.textContent===editState.removal) b.classList.add('selected');
    });
  });
}

function selectEditGoal(el){
  document.querySelectorAll('#screen-edit .goal-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}
function selectEditCheck(f,v,el){
  el.parentElement.querySelectorAll('.check-opt').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  editState[f]=v;
}

function saveEdit(){
  const r = currentKartes[currentIdx];
  const newParts = [...document.querySelectorAll('#editPartsGrid .part-tag.selected')].map(b=>b.textContent);
  const newGoal = (document.querySelector('#screen-edit .goal-btn.selected')||{}).textContent||'';
  const newDate = document.getElementById('editDate').value;
  const newComment = document.getElementById('editComment').value;
  const updated={date:newDate,name:currentName,parts:newParts,goal:newGoal,redness:editState.redness,removal:editState.removal,comment:newComment};
  const ri=records.findIndex(rec=>fmtDate(rec.date)===fmtDate(r.date)&&rec.name===r.name);
  if(ri>=0) records[ri]=updated;
  currentKartes[currentIdx]=updated;
  saveRecords();
  showToast('更新しました ✓');
}

</script>
